services:
  - type: web
    name: ari-lottery-api
    runtime: node
    plan: starter
    buildCommand: npm install
    startCommand: npm run server
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: CLIENT_URL
        value: https://ari-lottery.vercel.app
      - key: CLIENT_URLS
        value: https://ari-lottery.vercel.app
      - key: CRON_SCHEDULE
        value: "0 0 */3 * *"
      - key: DISABLE_LOTTERY_CRON
        value: "false"
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: SUPABASE_URL
        value: https://colsiffyvziuydfldaij.supabase.co
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: DEMO_AUTH_DISABLED
        value: "true"
      - key: DEMO_USER_ID
        value: 00000000-0000-4000-8000-000000000001
      - key: DEMO_USER_EMAIL
        value: demo@arilottery.local
      - key: ADMIN_API_KEY
        sync: false
